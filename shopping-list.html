<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .input-row button:hover { background: #5a67d8; }
    .input-row button:active { transform: scale(0.96); }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat {
      flex: 1;
      background: #f7fafc;
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
    }

    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 2px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 7px;
      border: 2px solid #e2e8f0;
      background: #fff;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #718096;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.done {
      opacity: 0.55;
      background: #edf2f7;
    }

    .item:hover { border-color: #c3dafe; }

    .check-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all 0.2s;
      color: transparent;
    }

    .item.done .check-btn {
      background: #48bb78;
      border-color: #48bb78;
      color: #fff;
    }

    .check-btn:hover { border-color: #48bb78; }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
    }

    .item.done .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .del-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .del-btn:hover { color: #fc8181; background: #fff5f5; }

    .clear-btn {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: none;
      border: 2px solid #fc8181;
      border-radius: 10px;
      color: #fc8181;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div class="app">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">오늘 사야 할 것들을 기록해요</p>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60" />
    <button id="addBtn" title="추가">+</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">완료</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="remainCount">0</div>
      <div class="stat-label">남음</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">미완료</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shopping') || '[]');
  let filter = 'all';

  const input    = document.getElementById('itemInput');
  const addBtn   = document.getElementById('addBtn');
  const listEl   = document.getElementById('list');
  const totalEl  = document.getElementById('totalCount');
  const doneEl   = document.getElementById('doneCount');
  const remainEl = document.getElementById('remainCount');
  const clearBtn = document.getElementById('clearDone');

  function save() {
    localStorage.setItem('shopping', JSON.stringify(items));
  }

  function render() {
    const filtered = items.filter(it =>
      filter === 'all'    ? true :
      filter === 'done'   ? it.done :
                            !it.done
    );

    listEl.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = filter === 'done' ? '완료된 항목이 없어요' :
                          filter === 'active' ? '남은 항목이 없어요 🎉' :
                          '아이템을 추가해보세요!';
      listEl.appendChild(empty);
    } else {
      filtered.forEach(it => {
        const li = document.createElement('li');
        li.className = 'item' + (it.done ? ' done' : '');

        const check = document.createElement('button');
        check.className = 'check-btn';
        check.title = it.done ? '미완료로 변경' : '완료';
        check.textContent = '✓';
        check.onclick = () => toggle(it.id);

        const name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = it.name;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.title = '삭제';
        del.textContent = '✕';
        del.onclick = () => remove(it.id);

        li.append(check, name, del);
        listEl.appendChild(li);
      });
    }

    const done  = items.filter(i => i.done).length;
    totalEl.textContent  = items.length;
    doneEl.textContent   = done;
    remainEl.textContent = items.length - done;
  }

  function addItem() {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    items.unshift({ id: Date.now(), name, done: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggle(id) {
    const it = items.find(i => i.id === id);
    if (it) { it.done = !it.done; save(); render(); }
  }

  function remove(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearBtn.addEventListener('click', () => {
    if (!items.some(i => i.done)) return;
    items = items.filter(i => !i.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
